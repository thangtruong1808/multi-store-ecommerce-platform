services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
      POSTGRES_DB: ${POSTGRES_DB:-MULTIPLY}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/Database-Schema-Generated.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-MULTIPLY}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=${POSTGRES_DB:-MULTIPLY};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-change-me}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost}
      PUBLIC_APP_BASE_URL: ${PUBLIC_APP_BASE_URL:-http://localhost}
      MAINTENANCE_MODE: ${MAINTENANCE_MODE:-false}
      JWT_SECRET: ${JWT_SECRET:-change-me-use-a-long-random-secret}
      JWT_ISSUER: ${JWT_ISSUER:-multi-store}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-multi-store}
      JWT_ACCESS_TOKEN_MINUTES: ${JWT_ACCESS_TOKEN_MINUTES:-15}
      JWT_REFRESH_TOKEN_DAYS: ${JWT_REFRESH_TOKEN_DAYS:-7}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      AZURE_STORAGE_ENABLED: ${AZURE_STORAGE_ENABLED:-false}
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING:-}
      AZURE_STORAGE_CONTAINER_NAME: ${AZURE_STORAGE_CONTAINER_NAME:-product-photos}
      AZURE_STORAGE_PUBLIC_BASE_URL: ${AZURE_STORAGE_PUBLIC_BASE_URL:-}
      AZURE_STORAGE_MAX_UPLOAD_BYTES: ${AZURE_STORAGE_MAX_UPLOAD_BYTES:-8388608}
      ACS_EMAIL_ENABLED: ${ACS_EMAIL_ENABLED:-false}
      ACS_EMAIL_CONNECTION_STRING: ${ACS_EMAIL_CONNECTION_STRING:-}
      ACS_EMAIL_SENDER_ADDRESS: ${ACS_EMAIL_SENDER_ADDRESS:-DoNotReply@example.com}
      PASSWORD_RESET_TOKEN_MINUTES: ${PASSWORD_RESET_TOKEN_MINUTES:-30}
      CONTACT_FORM_TO_EMAIL: ${CONTACT_FORM_TO_EMAIL:-}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
        VITE_PRODUCT_MEDIA_BASE_URL: ${VITE_PRODUCT_MEDIA_BASE_URL:-}
        VITE_SUPPORT_EMAIL: ${VITE_SUPPORT_EMAIL:-}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"

volumes:
  postgres_data:
