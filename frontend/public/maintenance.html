<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maintenance | Multi-Store</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        color: #1e293b;
        background: linear-gradient(to bottom, rgba(241, 245, 249, 0.9), #fff, rgba(248, 250, 252, 0.9));
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
      }
      .card {
        width: 100%;
        max-width: 28rem;
        background: #fff;
        border: 1px solid rgba(226, 232, 240, 0.9);
        border-radius: 1rem;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
        padding: 2rem 1.5rem;
        text-align: center;
      }
      .logo-wrap {
        display: flex;
        justify-content: center;
        margin-bottom: 1.25rem;
      }
      .logo {
        width: 2.75rem;
        height: 2.75rem;
        border-radius: 0.5rem;
        background: #0284c7;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .logo svg {
        width: 1.5rem;
        height: 1.5rem;
      }
      h1 {
        margin: 0 0 0.75rem;
        font-size: 1.5rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0;
        font-size: 0.9375rem;
        line-height: 1.6;
        color: #475569;
      }
      .hint {
        margin-top: 0.5rem;
        font-size: 0.75rem;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <main class="card" role="status" aria-live="polite">
      <div class="logo-wrap" aria-hidden="true">
        <div class="logo">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path
              d="M3 10.5L12 4L21 10.5V20H3V10.5Z"
              stroke="#ffffff"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
            <path d="M9 13H15M10 16.5H14" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round" />
          </svg>
        </div>
      </div>
      <h1>We&rsquo;ll be back soon</h1>
      <p>We are currently under maintenance. Please come back later.</p>
      <p class="hint">Thank you for your patience.</p>
    </main>
  </body>
</html>
