name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore and build
        run: |
          dotnet restore
          dotnet build --configuration Release --no-restore

  backend-unit-tests:
    name: Backend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore and test
        run: |
          dotnet restore backend.UnitTests/backend.UnitTests.csproj
          dotnet test backend.UnitTests/backend.UnitTests.csproj --configuration Release --no-restore
        working-directory: .

  backend-integration-tests:
    name: Backend integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: MULTIPLY
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d MULTIPLY"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      CI: true
      ConnectionStrings__Default: Host=localhost;Port=5432;Database=MULTIPLY;Username=postgres;Password=test
      JWT_SECRET: ci-test-secret-at-least-32-characters-long
      JWT_ISSUER: multi-store
      JWT_AUDIENCE: multi-store
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore and test
        run: |
          dotnet restore backend.IntegrationTests/backend.IntegrationTests.csproj
          dotnet test backend.IntegrationTests/backend.IntegrationTests.csproj \
            --configuration Release \
            --no-restore \
            --filter "Category=Integration&Category!=IntegrationDb"

  frontend:
    name: Frontend lint and typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and verify
        run: |
          npm ci
          npm run typecheck
          npm run lint

  frontend-unit-tests:
    name: Frontend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and test
        run: |
          npm ci
          npm run test:run

  docker:
    name: Docker build smoke test
    runs-on: ubuntu-latest
    needs:
      - backend
      - backend-unit-tests
      - backend-integration-tests
      - frontend
      - frontend-unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -t multi-store-api:ci ./backend

      - name: Build web image
        env:
          VITE_API_BASE_URL: https://api.example.com
          VITE_PRODUCT_MEDIA_BASE_URL: https://storage.example.com/product-photos
          VITE_SUPPORT_EMAIL: support@example.com
        run: |
          docker build -t multi-store-web:ci \
            --build-arg "VITE_API_BASE_URL=${VITE_API_BASE_URL}" \
            --build-arg "VITE_PRODUCT_MEDIA_BASE_URL=${VITE_PRODUCT_MEDIA_BASE_URL}" \
            --build-arg "VITE_SUPPORT_EMAIL=${VITE_SUPPORT_EMAIL}" \
            ./frontend
