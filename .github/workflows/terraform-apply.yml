name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to apply
        required: true
        type: choice
        options:
          - shared
          - staging
          - production

permissions:
  id-token: write
  contents: read

jobs:
  apply:
    name: Apply (${{ inputs.environment }})
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment == 'production' && 'production' || (inputs.environment == 'staging' && 'staging' || 'shared') }}
    defaults:
      run:
        working-directory: infra/terraform/environments/${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform init
        run: terraform init -backend-config=backend.hcl
        env:
          ARM_USE_OIDC: true

      - name: Terraform apply
        run: terraform apply -auto-approve -input=false
        env:
          ARM_USE_OIDC: true
