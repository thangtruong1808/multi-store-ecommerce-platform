name: Deploy Staging

on:
  push:
    branches: [develop]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read
  packages: write

jobs:
  deploy:
    name: Build, push to GHCR, and update staging
    runs-on: ubuntu-latest
    environment: staging
    env:
      IMAGE_TAG: staging
      SHA_TAG: sha-${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set GHCR image names
        run: |
          OWNER="${{ vars.GHCR_OWNER }}"
          if [ -z "$OWNER" ]; then OWNER="${{ github.repository_owner }}"; fi
          echo "GHCR_OWNER=$OWNER" >> "$GITHUB_ENV"
          echo "API_IMAGE=ghcr.io/${OWNER}/multi-store-api" >> "$GITHUB_ENV"
          echo "WEB_IMAGE=ghcr.io/${OWNER}/multi-store-web" >> "$GITHUB_ENV"
          echo "POSTGRES_IMAGE=ghcr.io/${OWNER}/multi-store-postgres" >> "$GITHUB_ENV"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        run: |
          docker build -t ${API_IMAGE}:${IMAGE_TAG} -t ${API_IMAGE}:${SHA_TAG} ./backend
          docker push ${API_IMAGE}:${IMAGE_TAG}
          docker push ${API_IMAGE}:${SHA_TAG}

      - name: Build and push web image
        run: |
          docker build -t ${WEB_IMAGE}:${IMAGE_TAG} -t ${WEB_IMAGE}:${SHA_TAG} \
            --build-arg VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }} \
            --build-arg VITE_PRODUCT_MEDIA_BASE_URL=${{ vars.VITE_PRODUCT_MEDIA_BASE_URL }} \
            --build-arg VITE_SUPPORT_EMAIL=${{ vars.VITE_SUPPORT_EMAIL }} \
            ./frontend
          docker push ${WEB_IMAGE}:${IMAGE_TAG}
          docker push ${WEB_IMAGE}:${SHA_TAG}

      - name: Build and push Postgres image (Azure Files)
        run: |
          docker build -t ${POSTGRES_IMAGE}:${IMAGE_TAG} -t ${POSTGRES_IMAGE}:${SHA_TAG} ./infra/docker/postgres-azurefiles
          docker push ${POSTGRES_IMAGE}:${IMAGE_TAG}
          docker push ${POSTGRES_IMAGE}:${SHA_TAG}

      - name: Update Postgres container app
        run: |
          az containerapp update \
            --name postgres \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --image ${POSTGRES_IMAGE}:${IMAGE_TAG}

      - name: Update API container app
        run: |
          az containerapp update \
            --name api \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --image ${API_IMAGE}:${IMAGE_TAG}

      - name: Update web container app
        run: |
          az containerapp update \
            --name web \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --image ${WEB_IMAGE}:${IMAGE_TAG}

      - name: Scale up apps after deploy (cold-start / showcase hours)
        run: |
          for app in postgres api web; do
            az containerapp update \
              --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
              --name "$app" \
              --min-replicas 1
          done
          echo "Waiting for Postgres and API warm-up..."
          sleep 90

      - name: Smoke test API health
        run: |
          for attempt in $(seq 1 18); do
            if curl -fsS "${{ vars.API_URL }}/api/health" | grep -q '"status":"ok"'; then
              echo "Health OK on attempt ${attempt}"
              exit 0
            fi
            echo "Attempt ${attempt}/18 — retrying in 10s..."
            sleep 10
          done
          echo "API health check failed after deploy"
          exit 1
