name: Terraform Plan

on:
  pull_request:
    paths:
      - "infra/terraform/**"
      - ".github/workflows/terraform-plan.yml"

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  plan:
    name: Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment: [shared, staging, production]
    defaults:
      run:
        working-directory: infra/terraform/environments/${{ matrix.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive ../..

      - name: Terraform init
        run: terraform init -backend-config=backend.hcl
        env:
          ARM_USE_OIDC: true
        continue-on-error: ${{ matrix.environment != 'shared' }}

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        run: terraform plan -no-color -input=false
        env:
          ARM_USE_OIDC: true
        continue-on-error: true

      - name: Comment plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const env = '${{ matrix.environment }}';
            const outcome = '${{ steps.plan.outcome }}';
            const body = `### Terraform plan: \`${env}\`\n\nStatus: **${outcome}**\n\nEnsure \`backend.hcl\` and \`terraform.tfvars\` exist locally for full plans in CI.`;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });
